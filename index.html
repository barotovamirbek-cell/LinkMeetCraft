<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkMeetCraft — Магазин Привилегий</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f7f5;
            --main-green: #5c8f52;
            --main-green-hover: #4a7541;
            --card-bg: #ffffff;
            --text-dark: #2d382c;
            --text-muted: #6b7c69;
            --accent-clay: #b87355;
            --border-radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Comfortaa', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Шапка сайта */
        header {
            background-color: var(--card-bg);
            padding: 20px;
            box-shadow: 0 4px 20px rgba(92, 143, 82, 0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 24px;
            color: var(--main-green);
        }

        .logo span {
            color: var(--accent-clay);
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
        }

        .tab-btn {
            background: none;
            border: 2px solid transparent;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: var(--border-radius);
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            color: var(--main-green);
            background-color: rgba(92, 143, 82, 0.05);
        }

        .tab-btn.active {
            background-color: var(--main-green);
            color: white;
        }

        /* Контентная зона */
        .main-content {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            flex-grow: 1;
            width: 100%;
        }

        .page-title {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-title h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 36px;
            margin-bottom: 10px;
        }

        .page-title p {
            color: var(--text-muted);
            font-size: 16px;
        }

        /* Вкладки */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Сетка Донатов */
        .donation-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 30px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.02);
            border: 2px solid rgba(92, 143, 82, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(92, 143, 82, 0.12);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
        }
        .p-lite::before { background-color: #a3c1ad; }
        .p-premium::before { background-color: #7bc0a3; }
        .p-creator::before { background-color: #f1a3a3; }
        .p-elite::before { background-color: #6fb1e4; }
        .p-deluxe::before { background-color: #b39ddb; }
        .p-nexus::before { background-color: #ffb74d; }

        .card-header h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 26px;
            margin-bottom: 5px;
        }

        .price {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent-clay);
            margin-bottom: 20px;
        }

        .features-list {
            list-style: none;
            margin-bottom: 30px;
        }

        .features-list li {
            margin-bottom: 12px;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
            padding-left: 24px;
        }

        .features-list li::before {
            content: '✔';
            position: absolute;
            left: 0;
            color: var(--main-green);
            font-weight: bold;
        }

        .buy-btn {
            display: block;
            text-align: center;
            background-color: var(--main-green);
            color: white !important;
            text-decoration: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            transition: background-color 0.2s ease;
            margin-top: auto;
            border: none;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        .buy-btn:hover {
            background-color: var(--main-green-hover);
        }

        /* Инфо-блок "Скоро будет больше" */
        .coming-soon-banner {
            background-color: rgba(92, 143, 82, 0.08);
            border: 2px dashed var(--main-green);
            border-radius: var(--border-radius);
            padding: 25px;
            text-align: center;
            margin-top: 30px;
            font-weight: 700;
            color: var(--main-green-hover);
        }

        /* Сетка Китов */
        .kits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 30px;
        }

        .kit-card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            border: 2px solid rgba(92, 143, 82, 0.1);
            text-align: center;
        }

        .kit-card h3 {
            font-family: 'Montserrat', sans-serif;
            margin-bottom: 15px;
            font-size: 20px;
        }

        .kit-img-wrapper {
            background-color: var(--bg-color);
            border-radius: 12px;
            width: 100%;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .kit-img-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .kit-card:hover .kit-img-wrapper img {
            transform: scale(1.05);
        }

        footer {
            background-color: #2d382c;
            color: #e2e8e1;
            text-align: center;
            padding: 20px;
            font-size: 14px;
            margin-top: 40px;
        }

        @media (max-width: 600px) {
            .nav-container {
                flex-direction: column;
            }
            .page-title h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo">LinkMeet<span>Craft</span></div>
            <div class="nav-tabs">
                <button id="btn-donates" class="tab-btn active" onclick="switchTab('donates')">Привилегии</button>
                <button id="btn-kits" class="tab-btn" onclick="switchTab('kits')">Наборы (Киты)</button>
            </div>
        </div>
    </header>

    <main class="main-content">
        
        <div id="donates" class="tab-content active">
            <div class="page-title">
                <h1>Выбор привилегии</h1>
